<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Exhibitor Exam Prep — Ohio Type I</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e4e6eb;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #30363d;
        }

        h1 {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #8b949e;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .stat-box {
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid #58a6ff;
        }

        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #58a6ff;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            background: #238636;
            color: white;
        }

        .btn:hover {
            background: #2ea043;
        }

        .btn.secondary {
            background: #30363d;
            color: #c9d1d9;
        }

        .btn.secondary:hover {
            background: #3d444d;
        }

        .btn.active {
            background: #58a6ff;
            color: #0f1419;
        }

        select {
            padding: 10px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #161b22;
            color: #c9d1d9;
            font-size: 14px;
            cursor: pointer;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        .card-category {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .card-question {
            font-size: 20px;
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .card-answer {
            font-size: 18px;
            color: #58a6ff;
            line-height: 1.5;
        }

        .flip-hint {
            font-size: 12px;
            color: #6e7681;
            margin-top: 20px;
            text-align: center;
        }

        .quiz-options {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .option {
            padding: 15px;
            border: 2px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            background: #0d1117;
            color: #c9d1d9;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: #58a6ff;
            background: #161b22;
        }

        .option.selected {
            border-color: #58a6ff;
            background: #161b22;
        }

        .option.correct {
            border-color: #2ea043;
            background: rgba(46, 160, 67, 0.1);
            color: #2ea043;
        }

        .option.incorrect {
            border-color: #da3633;
            background: rgba(218, 54, 51, 0.1);
            color: #ff7b72;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0d1117;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #58a6ff;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .navigation {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .pass-indicator {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }

        .pass-indicator.pass {
            background: rgba(46, 160, 67, 0.1);
            color: #2ea043;
            border: 2px solid #2ea043;
        }

        .pass-indicator.fail {
            background: rgba(218, 54, 51, 0.1);
            color: #ff7b72;
            border: 2px solid #da3633;
        }

        .result-item {
            background: #161b22;
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid #da3633;
            margin-bottom: 10px;
        }

        .result-item.correct {
            border-left-color: #2ea043;
        }

        .result-question {
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 8px;
        }

        .result-your-answer {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .result-correct-answer {
            font-size: 12px;
            color: #2ea043;
            margin-bottom: 5px;
        }

        .hidden {
            display: none !important;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #58a6ff;
            text-align: center;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .card {
                padding: 20px;
                min-height: 250px;
            }

            .card-question {
                font-size: 16px;
            }

            .card-answer {
                font-size: 16px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .controls {
                flex-direction: column;
            }

            .btn, select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎆 Fireworks Exhibitor Exam Prep</h1>
            <p class="subtitle">Ohio Type I License Exam — 100 Questions, 70% to Pass</p>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreDisplay">0%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Correct</div>
                    <div class="stat-value" id="correctDisplay">0/0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="streakDisplay">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Cards</div>
                    <div class="stat-value" id="totalCards">0</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <button class="btn active" id="flashcardMode">📇 Flashcards</button>
            <button class="btn secondary" id="quizMode">📝 Quiz</button>
            <button class="btn secondary" id="reviewMode">🔍 Review Missed</button>
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="NFPA 1123">NFPA 1123</option>
                <option value="NFPA 1126">NFPA 1126</option>
                <option value="Classifications">Classifications</option>
                <option value="Ohio Law">Ohio Law</option>
                <option value="Terminology">Terminology</option>
                <option value="Acronyms">Acronyms</option>
                <option value="Safety">Safety</option>
            </select>
            <button class="btn secondary" id="resetBtn">🔄 Reset</button>
        </div>

        <div id="flashcardSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="card" id="card">
                <div class="card-category" id="cardCategory"></div>
                <div class="card-question" id="cardQuestion"></div>
                <div id="cardAnswerContainer" style="display: none;">
                    <div class="card-answer" id="cardAnswer"></div>
                </div>
                <div class="flip-hint" id="flipHint">Tap to reveal answer</div>
            </div>
            <div class="navigation">
                <button class="btn secondary" id="missBtn">❌ Missed</button>
                <button class="btn" id="gotItBtn">✅ Got It</button>
                <button class="btn secondary" id="nextBtn">→ Next</button>
            </div>
        </div>

        <div id="quizSection" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="quizProgressFill" style="width: 0%"></div>
            </div>
            <div class="card">
                <div class="card-category" id="quizCategory"></div>
                <div class="card-question" id="quizQuestion"></div>
                <div class="quiz-options" id="quizOptions"></div>
            </div>
            <div class="navigation">
                <button class="btn" id="submitAnswerBtn">Submit Answer</button>
                <button class="btn secondary" id="skipBtn">Skip</button>
            </div>
        </div>

        <div id="resultsSection" class="hidden">
            <h2 style="text-align: center; margin-bottom: 20px;">Quiz Results</h2>
            <div class="score-display" id="finalScore">0%</div>
            <div class="pass-indicator" id="passIndicator"></div>
            <div id="resultsList"></div>
            <div class="navigation" style="margin-top: 30px;">
                <button class="btn" id="restartBtn">🔄 Try Again</button>
            </div>
        </div>

        <div id="reviewSection" class="hidden">
            <h2 style="text-align: center; margin-bottom: 20px;">Missed Questions</h2>
            <div id="missedList"></div>
            <div class="navigation">
                <button class="btn" id="backBtn">← Back</button>
            </div>
        </div>
    </div>

    <script>
        // 70 FLASHCARDS covering all exam topics
        const flashcards = [
            // OHIO LAW (11 cards - PRIORITY: What makes Type I unique)
            {category:"Ohio Law",q:"What is ORC 3743?",a:"Ohio Revised Code Chapter 3743 — the law governing all fireworks licensing, permits, and regulations in Ohio."},
            {category:"Ohio Law",q:"What are Ohio's three exhibitor license types and what do they authorize?",a:"Type I: Display fireworks (1.3G only). Type II: Fireworks distributor. Type III: Fireworks wholesaler."},
            {category:"Ohio Law",q:"What must you do to get a Type I license in Ohio?",a:"Be 18+, pass this exam (70%), provide $1M insurance, apply to SFM 30 days before first event, background check clear."},
            {category:"Ohio Law",q:"Who issues Type I licenses and what's the renewal deadline?",a:"State Fire Marshal (SFM) issues 1-year licenses. Renewal deadline: April 1. License voids if not renewed by April 1."},
            {category:"Ohio Law",q:"What is a pyrotechnic permit and how does it differ from a license?",a:"License: Proves you're qualified (good for 1 year). Permit: AHJ approval for one specific event (date/location). Apply 30 days in advance."},
            {category:"Ohio Law",q:"When can AHJ deny or revoke a permit?",a:"Safety hazards, unqualified operator, insufficient insurance, unsuitable site, violations of ORC 3743, or previous unsafe conduct."},
            {category:"Ohio Law",q:"What is HB 172 and what did it change about fireworks rules?",a:"HB 172 expanded 1.4G consumer fireworks regulations and modified licensing procedures (check SFM for current specifics)."},
            {category:"Ohio Law",q:"Is workers compensation required for fireworks operators?",a:"Yes, if you operate as a business with employees. Check Ohio Bureau of Workers Compensation (BWC) for current coverage requirements."},
            {category:"Ohio Law",q:"What is a registered assistant in Ohio and how is it different from an operator?",a:"Assistant licensed to help under Type I operator's supervision. Requires separate $25 application 14 days before event; cannot independently operate."},
            {category:"Ohio Law",q:"What is the penalty for operating display fireworks without a Type I license in Ohio?",a:"Civil fine up to $500 per violation, plus potential criminal charges."},
            {category:"Ohio Law",q:"What are the insurance requirements for Type I exhibitors in Ohio?",a:"Minimum $1,000,000 general liability insurance. Must provide proof when applying for license and permits."},
            
            // NFPA 1123 (10 cards - Core display knowledge)
            {category:"NFPA 1123",q:"What's the difference between deflagration and detonation?",a:"Deflagration: rapid burning (subsonic, used in lift charges). Detonation: violent explosion with shockwave (supersonic, avoided in pyrotechnics)."},
            {category:"NFPA 1123",q:"What is black powder, flash powder, and lift charge?",a:"Black powder: saltpeter/charcoal/sulfur fuel for lift charges. Flash powder: bright-burning composition for effects. Lift charge: black powder elevating a shell."},
            {category:"NFPA 1123",q:"What are the key device types in display fireworks?",a:"Aerial shell: launched from mortar. Mortar: tube device. Salute: loud report device. Mine: ground-level device. Cake/battery: multi-tube device firing in sequence."},
            {category:"NFPA 1123",q:"What is fallout radius and how is it determined?",a:"Distance where shell debris falls. Calculate as 1.5x burst height minimum. Add buffer for wind. Varies: 3-inch 50ft, 6-inch 100ft+."},
            {category:"NFPA 1123",q:"How do you inspect mortars before a display?",a:"Check for cracks/corrosion/burrs. Verify tube diameter matches shells. Confirm fuse holes clear. Test mounting stability."},
            {category:"NFPA 1123",q:"What's the misfire procedure if a shell fails to fire?",a:"Wait 15+ minutes. Clear non-essential personnel. Approach from safe angle. Inspect without handling. Re-attempt only if safe. Soak in water if stuck."},
            {category:"NFPA 1123",q:"What criteria make a good display site?",a:"Clear of obstacles/buildings/power lines. Minimum fallout radius available. Good drainage. Level ground. Away from combustibles. Owner permission. AHJ approval."},
            {category:"NFPA 1123",q:"What's the difference between electrical and hand-firing?",a:"Electrical: e-match ignited from distance (safest). Hand-firing: match/lighter at close range (requires skill, higher risk)."},
            {category:"NFPA 1123",q:"What temperature and storage conditions are required for black powder magazines?",a:"50-90°F (10-32°C), kept dry. Stored in locked magazine separate from buildings, well-ventilated, clearly labeled."},
            {category:"NFPA 1123",q:"What is the relationship between burst height, fallout distance, and audience separation?",a:"Burst height determines fallout radius (1.5x). Audience must be beyond fallout radius or protected by barriers."},
            
            // NFPA 1126 (4 cards - Proximate audience)
            {category:"NFPA 1126",q:"What is NFPA 1126 and what makes it different from 1123?",a:"1126: Standard for proximate audience fireworks (audience 15-50 ft away). Uses smaller, safer devices than 1123. Requires stricter monitoring and approval."},
            {category:"NFPA 1126",q:"What safety measures are required for proximate audience displays?",a:"Barriers/distance controls. Operator qualifications. Plan submission to AHJ. Walk-through inspection. Fire safety system checks. Audience protection measures."},
            {category:"NFPA 1126",q:"What plan must you submit to AHJ for a proximate audience display?",a:"Device types/quantities, layout diagram, audience distances/barriers, operator qualifications, fire safety procedures, emergency plan, insurance proof."},
            {category:"NFPA 1126",q:"Who is responsible for audience safety in a proximate audience display?",a:"Operator and venue owner jointly share responsibility. Both must ensure audience protection and compliance with 1126 distance/barrier rules."},
            
            // CLASSIFICATIONS (3 cards - Consolidated)
            {category:"Classifications",q:"What's the difference between 1.3G and 1.4G fireworks?",a:"1.3G: Display fireworks (higher hazard, professional only, e.g., aerial shells). 1.4G: Consumer fireworks (lower hazard, e.g., sparklers, fountains)."},
            {category:"Classifications",q:"What UN classifications apply to fireworks?",a:"0333/0334: 1.4G fireworks. 0335: 1.3G fireworks. 0336: 1.4S (consumer). 0337: 1.3G articles. 0431/0432: Explosive articles/devices."},
            {category:"Classifications",q:"What does the UN number tell you about fireworks?",a:"Hazard classification and regulatory requirements for storage, transport, and use. Determines licensing and handling requirements."},
            
            // SAFETY (8 cards)
            {category:"Safety",q:"What are the 5 critical pre-display checks?",a:"1) Inspect devices for damage/labeling. 2) Check weather (no winds >12mph, rain, storms). 3) Verify mortars aligned. 4) Confirm safety perimeter. 5) Verify fire extinguishers ready."},
            {category:"Safety",q:"What are the danger zones and required distances from spectators?",a:"Discharge site: 100+ ft from non-personnel. Audience: minimum 1.5x burst height (varies by AHJ/device). Fallout area: 1.5x burst height plus wind buffer."},
            {category:"Safety",q:"What's the misfire protocol: what's the waiting period and why?",a:"Wait 15+ minutes minimum for fuse to burn out completely. Then approach safely, inspect without touching, re-attempt only if obviously safe. Worst case: soak in water."},
            {category:"Safety",q:"When must you cancel or postpone a display?",a:"High winds >12 mph, low cloud ceiling, rain/precipitation, insufficient visibility, electrical storm approaching. Safety over schedule always."},
            {category:"Safety",q:"What protective gear must operators wear during a display?",a:"Safety glasses, gloves, retardant-treated clothing. Essential for hand-firing and close-range operations."},
            {category:"Safety",q:"What fire extinguishers are needed at a fireworks display and what classes?",a:"Class C (dry powder) for electrical circuits. Water/foam for general fires. Multiple units positioned around discharge site."},
            {category:"Safety",q:"What are the post-display inspection requirements?",a:"Search for unexploded shells/debris. Check for fires/hot spots. Document any misfires. Collect dud shells for safe disposal later."},
            {category:"Safety",q:"What are the roles of operator, assistant, and AHJ in maintaining safety?",a:"Operator: in-charge, responsible for compliance. Assistant: supports under supervision. AHJ: approves permit, inspects site, enforces regulations."},
            
            // TERMINOLOGY (6 cards - Consolidated)
            {category:"Terminology",q:"What's a shell burst, star, and salute in fireworks?",a:"Shell burst: aerial shell explosion at peak altitude. Star: colored pellet burning inside shell. Salute: device producing loud report (noise effect)."},
            {category:"Terminology",q:"What are quick match, fuse, and time fuse?",a:"Quick match: fused cord synchronizing timing. Fuse: cord burning at known rate to ignite device. Time fuse: fuse delaying ignition for effect timing."},
            {category:"Terminology",q:"What is a break charge, cake/battery, and caliber?",a:"Break charge: explosive dispersing shell effects. Cake/battery: multi-tube device firing in sequence. Caliber: mortar tube diameter (3/4/6-inch typical)."},
            {category:"Terminology",q:"What is fallout radius, discharge site, and setback distance?",a:"Fallout radius: where debris falls (1.5x burst height min). Discharge site: firing location. Setback: min distance from structures/property lines."},
            {category:"Terminology",q:"What is a crossette effect?",a:"Shell that breaks mid-air into smaller shells, each creating separate burst effect (cascading appearance)."},
            {category:"Terminology",q:"What color chemicals are used in fireworks and which metal produces each color?",a:"Strontium: red. Copper: blue. Barium: green. Sodium: yellow. Metal compounds burning with color inside shells."},
            
            // ACRONYMS (5 cards - Consolidated by theme)
            {category:"Acronyms",q:"What do AHJ, SFM, and DOC stand for in fireworks regulation?",a:"AHJ: Authority Having Jurisdiction (local fire marshal). SFM: State Fire Marshal (Ohio official). DOC: Department of Commerce (Ohio agency issuing licenses)."},
            {category:"Acronyms",q:"What do NFPA, ATF, and CPSC stand for?",a:"NFPA: National Fire Protection Association (safety standards). ATF: Bureau of Alcohol, Tobacco, Firearms (federal explosives). CPSC: Consumer Product Safety Commission."},
            {category:"Acronyms",q:"What do APA, PGI, and ORC stand for?",a:"APA: American Pyrotechnics Association (professional). PGI: Pyrotechnics Guild International (guild). ORC: Ohio Revised Code (state law)."},
            {category:"Acronyms",q:"What do DOT and OFC stand for?",a:"DOT: Department of Transportation (transporting explosives). OFC: Ohio Fire Code (incorporates NFPA standards)."},
            {category:"Acronyms",q:"What are BCI and USPA in fireworks context?",a:"BCI: Bureau of Criminal Investigation (Ohio fireworks licensing). USPA: United States Parachute Association (also recognized for pyro credentials)."},
        ];

        let state = {
            mode: 'flashcard',
            currentCardIndex: 0,
            currentQuizIndex: 0,
            filteredCards: [],
            correct: 0,
            incorrect: 0,
            streak: 0,
            maxStreak: 0,
            quizAnswers: [],
            missedCards: [],
            selectedCategory: '',
        };

        function init() {
            filterCards();
            document.getElementById('totalCards').textContent = state.filteredCards.length;
            loadCard();
            setupEventListeners();
        }

        function setupEventListeners() {
            document.getElementById('flashcardMode').addEventListener('click', () => switchMode('flashcard'));
            document.getElementById('quizMode').addEventListener('click', () => switchMode('quiz'));
            document.getElementById('reviewMode').addEventListener('click', () => switchMode('review'));
            document.getElementById('resetBtn').addEventListener('click', init);
            
            document.getElementById('card').addEventListener('click', flipCard);
            document.getElementById('gotItBtn').addEventListener('click', () => markCard(true));
            document.getElementById('missBtn').addEventListener('click', () => markCard(false));
            document.getElementById('nextBtn').addEventListener('click', nextCard);
            
            document.getElementById('categoryFilter').addEventListener('change', (e) => {
                state.selectedCategory = e.target.value;
                filterCards();
                state.currentCardIndex = 0;
                loadCard();
            });

            document.getElementById('submitAnswerBtn').addEventListener('click', submitQuizAnswer);
            document.getElementById('skipBtn').addEventListener('click', skipQuestion);
            document.getElementById('restartBtn').addEventListener('click', () => location.reload());
            document.getElementById('backBtn').addEventListener('click', () => switchMode('flashcard'));
        }

        function filterCards() {
            state.filteredCards = state.selectedCategory ? flashcards.filter(c => c.category === state.selectedCategory) : flashcards.slice();
            document.getElementById('totalCards').textContent = state.filteredCards.length;
        }

        function switchMode(mode) {
            state.mode = mode;
            document.getElementById('flashcardSection').classList.toggle('hidden', mode !== 'flashcard');
            document.getElementById('quizSection').classList.toggle('hidden', mode !== 'quiz');
            document.getElementById('resultsSection').classList.toggle('hidden', mode !== 'results');
            document.getElementById('reviewSection').classList.toggle('hidden', mode !== 'review');

            [document.getElementById('flashcardMode'),document.getElementById('quizMode'),document.getElementById('reviewMode')].forEach(el => el.classList.remove('active'));
            if (mode === 'flashcard') document.getElementById('flashcardMode').classList.add('active');
            if (mode === 'quiz') { document.getElementById('quizMode').classList.add('active'); state.currentQuizIndex = 0; state.quizAnswers = []; loadQuizCard(); }
            if (mode === 'review') { document.getElementById('reviewMode').classList.add('active'); renderMissedCards(); }
        }

        function loadCard() {
            if (!state.filteredCards.length) return;
            if (state.currentCardIndex >= state.filteredCards.length) state.currentCardIndex = 0;
            const card = state.filteredCards[state.currentCardIndex];
            document.getElementById('cardCategory').textContent = card.category;
            document.getElementById('cardQuestion').textContent = card.q;
            document.getElementById('cardAnswer').textContent = card.a;
            document.getElementById('cardAnswerContainer').style.display = 'none';
            document.getElementById('flipHint').style.display = 'block';
            updateProgress();
        }

        function flipCard() {
            const container = document.getElementById('cardAnswerContainer');
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
            document.getElementById('flipHint').textContent = container.style.display === 'none' ? 'Tap to reveal answer' : 'Answer revealed — tap to hide';
        }

        function markCard(correct) {
            if (correct) { state.correct++; state.streak++; if (state.streak > state.maxStreak) state.maxStreak = state.streak; }
            else { state.incorrect++; state.streak = 0; state.missedCards.push(state.filteredCards[state.currentCardIndex]); }
            updateStats();
            nextCard();
        }

        function nextCard() {
            state.currentCardIndex++;
            if (state.currentCardIndex >= state.filteredCards.length) state.currentCardIndex = 0;
            loadCard();
        }

        function updateStats() {
            const total = state.correct + state.incorrect;
            const percentage = total === 0 ? 0 : Math.round((state.correct / total) * 100);
            document.getElementById('scoreDisplay').textContent = percentage + '%';
            document.getElementById('correctDisplay').textContent = state.correct + '/' + total;
            document.getElementById('streakDisplay').textContent = state.streak;
        }

        function updateProgress() {
            const progress = state.filteredCards.length ? ((state.currentCardIndex + 1) / state.filteredCards.length) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function loadQuizCard() {
            if (state.currentQuizIndex >= state.filteredCards.length) { endQuiz(); return; }
            const card = state.filteredCards[state.currentQuizIndex];
            document.getElementById('quizCategory').textContent = card.category;
            document.getElementById('quizQuestion').textContent = card.q;

            const options = [card.a];
            const wrong = state.filteredCards.filter(c => c.q !== card.q).map(c => c.a).sort(() => Math.random() - 0.5).slice(0, 3);
            options.push(...wrong);
            options.sort(() => Math.random() - 0.5);

            const optionsDiv = document.getElementById('quizOptions');
            optionsDiv.innerHTML = '';
            options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.dataset.correct = idx === options.indexOf(card.a);
                div.addEventListener('click', function() {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
                optionsDiv.appendChild(div);
            });

            const progress = ((state.currentQuizIndex) / state.filteredCards.length) * 100;
            document.getElementById('quizProgressFill').style.width = progress + '%';
        }

        function submitQuizAnswer() {
            const selected = document.querySelector('.option.selected');
            if (!selected) { alert('Select an answer first'); return; }
            
            const isCorrect = selected.dataset.correct === 'true';
            const card = state.filteredCards[state.currentQuizIndex,

            {category:"NFPA 1123",q:"What are typical separation distances for display fireworks?",a:"Minimum 1.5x burst height, but varies by shell size: 3-inch shells 50ft, 4-inch 75ft, 6-inch 100ft+. Local AHJ may require greater distances."},
            {category:"NFPA 1123",q:"What is the process for mortar inspection before display?",a:"Check for cracks, corrosion, burrs; ensure proper tube diameter; verify fuse holes are clear; test stability of mounting; document condition."},
            {category:"NFPA 1123",q:"What is the difference between electrical and hand-firing?",a:"Electrical firing uses e-match to ignite from distance (safest); hand-firing uses match or lighter at close range (requires more operator skill and safety precautions)."},
            {category:"NFPA 1123",q:"What is the proper procedure if a shell fails to fire (misfire)?",a:"Wait 15+ minutes; clear area of non-essential personnel; approach misfire from safe angle; investigate without handling; attempt re-ignition only if safe; if fails again, soak in water before disposal."},
            {category:"NFPA 1123",q:"What criteria should be used to select a display site?",a:"Clear of obstacles, buildings, power lines; minimum fallout radius available; good drainage; level ground; away from combustibles; permission from property owner; AHJ approval."},
            {category:"NFPA 1123",q:"What should a pre-display inspection include?",a:"Weather check, ground conditions, shell inventory, fuse integrity, mortar alignment, safety perimeter setup, fire extinguisher placement, personnel briefing, last-minute hazard check."},
            {category:"NFPA 1123",q:"What should a post-display inspection include?",a:"Search for unexploded shells and debris; check for fires/hot spots; document any misfire incidents; collect dud shells for safe disposal; inspect mortars for damage."},
            {category:"NFPA 1123",q:"What are the roles of operator, assistant, and AHJ in a display?",a:"Operator: in-charge, responsible for safety and compliance. Assistant: supports operator, handles equipment. AHJ: approves permit, inspects site, may observe or shut down unsafe operation."},
            {category:"NFPA 1123",q:"What are magazine storage requirements for fireworks?",a:"Magazine must be: separate from other buildings; well-ventilated; dry; locked; constructed per ATF standards; labeled with contents; maintained away from ignition sources."},
            {category:"NFPA 1123",q:"How is fallout area determined for safety planning?",a:"Calculate based on largest shell size and burst altitude. Typical rule: fallout radius = 1.5x burst height. Add buffer for wind drift. Mark perimeter and keep spectators outside."},
            {category:"NFPA 1126",q:"How does NFPA 1126 differ from NFPA 1123?",a:"1126 = Proximate audience (spectators close to devices). 1123 = Display fireworks (distant, professional). 1126 requires smaller devices, closer monitoring, stricter safety measures, audience proximity controls."},
            {category:"NFPA 1126",q:"What operator qualifications are required for NFPA 1126 displays?",a:"Must be at least 18 years old, trained in device operation, familiar with NFPA 1126 rules, able to communicate with AHJ, capable of managing audience proximity safely."},
            {category:"NFPA 1126",q:"What plan must be submitted to AHJ before a proximate audience display?",a:"Written plan including: device types/quantities, layout diagram, audience distance/barriers, operator qualifications, fire safety, emergency procedures, insurance proof."},
            {category:"NFPA 1126",q:"What are walk-through requirements for proximate audience displays?",a:"AHJ representative must walk the site before display; verify setup matches submitted plan; confirm barriers/distances correct; check fire safety readiness; approve final setup."},
            {category:"NFPA 1126",q:"What are the differences between indoor and outdoor proximate displays?",a:"Outdoor: standard 1126 rules apply. Indoor: additional ventilation requirements, ceiling height clearances, stricter fire safety, limited device types, structural stability checks required."},
            {category:"NFPA 1126",q:"What are airburst devices in proximate audience context?",a:"Small shells designed to burst at low altitude (30-50ft) safely near audience. Must be approved/tested by CPSC. Operate under strict NFPA 1126 proximity and observer requirements."},
            {category:"NFPA 1126",q:"What is the procedure for disarming and restoring fire safety systems?",a:"If fire alarm/suppression must be disabled during display: notify fire official, disable system, conduct display, immediately restore system; document procedure and sign-off."},
            {category:"Ohio Law",q:"What are the three fireworks exhibitor license types in Ohio?",a:"Type I: Display fireworks (1.3G, professional). Type II: Fireworks distributor. Type III: Fireworks wholesaler. Each authorizes different activities and requires different qualifications."},
            {category:"Ohio Law",q:"What does the exhibitor license application process require?",a:"Submit form to SFM, $50 fee, 30-day advance notice, background check clearance, proficiency letter from recognized pyrotechnics organization, proof of insurance (minimum $1M)."},
            {category:"Ohio Law",q:"What are registered assistant requirements in Ohio?",a:"Registered assistant: must apply 14 days before event, pay $25 fee, work under Type I exhibitor supervision, pass proficiency check, assist but cannot independently operate."},
            {category:"Ohio Law",q:"When does an Ohio fireworks exhibitor license expire and what happens if not renewed?",a:"License expires April 1 each year. If not renewed by April 1, license becomes VOID and operator cannot legally conduct displays until new license issued."},
            {category:"Ohio Law",q:"What are ORC 3743.80 exemptions?",a:"Certain devices/activities may be exempt from licensing (e.g., consumer fireworks, specific 1.4G use). Check with SFM for current exemptions under HB 172 amendments."},
            {category:"Ohio Law",q:"What are HB 172 consumer discharge rules?",a:"HB 172 expanded when/how certain 1.4G consumer fireworks can be discharged. Check with SFM for current rules; generally allows limited consumer use under specific conditions."},
            {category:"Ohio Law",q:"On what grounds can AHJ deny or revoke a fireworks permit?",a:"Safety hazards, inadequate planning, operator unqualified, insurance insufficient, site unsuitable, violations of ORC 3743, previous unsafe operations, or non-compliance with conditions."},
            {category:"Ohio Law",q:"Is workers compensation insurance required for fireworks operators?",a:"Yes, if operating as business with employees. Must carry appropriate workers comp. Verify with Ohio BWC (Bureau of Workers Compensation) for current requirements."},
            {category:"Terminology",q:"What are the UN classifications for fireworks? (List key numbers)",a:"0333/0334: Fireworks 1.4G. 0335: Fireworks 1.3G. 0336: Fireworks 1.4S. 0337: Fireworks 1.3G. 0431: Articles (explosive components). 0432: Articles (explosive devices)."},
            {category:"Terminology",q:"What is UN classification 1.4S and how does it differ from 1.4G?",a:"1.4S: Consumer fireworks with extra safety measures. 1.4G: General consumer fireworks. 1.4S has stricter manufacturing controls and burn rate limits for added safety margin."},
            {category:"Terminology",q:"What is a cake or battery in fireworks terminology?",a:"Multi-effect device with multiple tubes or effects fired in sequence. Cake: single rectangular device. Battery: multiple units lashed together firing together as one effect."},
            {category:"Terminology",q:"What is setback distance?",a:"Minimum horizontal distance between discharge site and structures, property lines, or hazards. Varies by jurisdiction and device type. Always verify with AHJ."},
            {category:"Acronyms",q:"What does BCI stand for?",a:"BCI = Bureau of Criminal Investigation (Ohio agency involved in licensing and compliance for explosives and fireworks)."},
            {category:"Acronyms",q:"What does USPA stand for?",a:"USPA = United States Parachute Association (also recognized for pyrotechnics proficiency credentials in some states)."},
];
            
            if (isCorrect) { state.correct++; state.streak++; if (state.streak > state.maxStreak) state.maxStreak = state.streak; }
            else { state.incorrect++; state.streak = 0; state.missedCards.push(card); }

            state.quizAnswers.push({ q: card.q, a: card.a, userAnswer: selected.textContent, correct: isCorrect, category: card.category });
            updateStats();

            selected.classList.add(isCorrect ? 'correct' : 'incorrect');
            setTimeout(() => { state.currentQuizIndex++; loadQuizCard(); }, 600);
        }

        function skipQuestion() { state.currentQuizIndex++; loadQuizCard(); }

        function endQuiz() {
            const total = state.correct + state.incorrect;
            const percentage = total === 0 ? 0 : Math.round((state.correct / total) * 100);
            const willPass = percentage >= 70;

            document.getElementById('finalScore').textContent = percentage + '%';
            const passDiv = document.getElementById('passIndicator');
            passDiv.className = willPass ? 'pass-indicator pass' : 'pass-indicator fail';
            passDiv.innerHTML = willPass ? '✅ <strong>YOU WOULD PASS THE EXAM</strong><br>(70% Required)' : '❌ <strong>YOU WOULD FAIL THE EXAM</strong><br>(70% Required)';

            let html = '';
            state.quizAnswers.forEach((ans, idx) => {
                html += `<div class="result-item ${ans.correct ? 'correct' : ''}"><div class="result-question">${idx + 1}. ${ans.q}</div><div class="result-your-answer">Your: ${ans.userAnswer}</div>${!ans.correct ? `<div class="result-correct-answer">Correct: ${ans.a}</div>` : ''}</div>`;
            });
            document.getElementById('resultsList').innerHTML = html;

            state.mode = 'results';
            document.getElementById('flashcardSection').classList.add('hidden');
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
        }

        function renderMissedCards() {
            if (!state.missedCards.length) { document.getElementById('missedList').innerHTML = '<p style="text-align: center; color: #2ea043; font-size: 18px;">🎉 Perfect! No missed cards!</p>'; return; }
            let html = '';
            state.missedCards.forEach((card, idx) => {
                html += `<div class="card" style="margin-bottom: 15px;"><div class="card-category">${card.category}</div><div class="card-question">${card.q}</div><div class="card-answer">${card.a}</div></div>`;
            });
            document.getElementById('missedList').innerHTML = html;
        }

        // Ensure init runs on page load - cross-browser compatible
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // Fallback: window.load as backup
        window.addEventListener('load', () => {
            if (!state.filteredCards || state.filteredCards.length === 0) {
                init();
            }
        });
    </script>
