<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Exhibitor Exam Prep — Ohio Type I</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e4e6eb;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #30363d;
        }

        h1 {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #8b949e;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: #238636;
            color: white;
        }

        .btn:hover {
            background: #2ea043;
        }

        .btn.active {
            background: #58a6ff;
            color: #0f1419;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .card-category {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .card-question {
            font-size: 20px;
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 20px;
        }

        .card-answer {
            font-size: 18px;
            color: #58a6ff;
        }

        .flip-hint {
            font-size: 12px;
            color: #6e7681;
            margin-top: 20px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat {
            background: #161b22;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border-left: 3px solid #58a6ff;
        }

        .stat-label {
            font-size: 11px;
            color: #8b949e;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎆 Fireworks Exhibitor Exam Prep</h1>
            <p class="subtitle">Ohio Type I License Exam — 70% to Pass</p>
        </header>

        <div class="controls">
            <button class="btn active" id="flashcardMode">Flashcards</button>
            <button class="btn" id="quizMode">Quiz</button>
            <button class="btn secondary" id="resetBtn">Reset</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Cards</div>
                <div class="stat-value" id="totalCards">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Correct</div>
                <div class="stat-value" id="correctCount" style="color: #2ea043;">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Incorrect</div>
                <div class="stat-value" id="incorrectCount" style="color: #da3633;">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="streakCount">0</div>
            </div>
        </div>

        <div id="flashcardSection">
            <div class="card" id="card">
                <div class="card-category" id="cardCategory">Category</div>
                <div class="card-question" id="cardQuestion">Question?</div>
                <div class="card-answer hidden" id="cardAnswer">Answer</div>
                <div class="flip-hint" id="flipHint">Click to reveal answer</div>
            </div>
        </div>

        <div id="quizSection" class="hidden">
            <div class="card">
                <div class="card-category" id="quizCategory">Category</div>
                <div class="card-question" id="quizQuestion">Question?</div>
                <div id="quizOptions"></div>
                <button class="btn" id="submitBtn" style="margin-top: 20px;">Submit Answer</button>
            </div>
        </div>
    </div>

    <script>
        const flashcards = [
            {category: "Ohio Law", q: "What is ORC 3743?", a: "Ohio Revised Code Chapter 3743 governs all fireworks licensing and regulations."},
            {category: "Ohio Law", q: "What are Ohio's three exhibitor license types?", a: "Type I: Display fireworks (1.3G). Type II: Distributor. Type III: Wholesaler."},
            {category: "NFPA 1123", q: "What is the minimum separation distance for display fireworks?", a: "Minimum 1.5x burst height, typically 50-100+ feet depending on shell size."},
            {category: "NFPA 1123", q: "What's the difference between electrical and hand-firing?", a: "Electrical firing uses e-match from distance (safer). Hand-firing requires close-range use (less safe)."},
            {category: "Terminology", q: "What is a cake or battery?", a: "Multi-effect device with tubes firing in sequence. Cake: single rectangular unit. Battery: multiple units together."},
            {category: "Terminology", q: "What is setback distance?", a: "Minimum horizontal distance between discharge site and structures, property lines, or hazards."},
            {category: "Acronyms", q: "What does AHJ stand for?", a: "Authority Having Jurisdiction - your local fire marshal or officials."},
            {category: "Acronyms", q: "What does NFPA stand for?", a: "National Fire Protection Association - sets safety standards."},
            {category: "Acronyms", q: "What does ATF stand for?", a: "Bureau of Alcohol, Tobacco, Firearms - federal explosives authority."}
        ];

        let state = {
            mode: 'flashcard',
            cardIndex: 0,
            correct: 0,
            incorrect: 0,
            streak: 0
        };

        function init() {
            document.getElementById('totalCards').textContent = flashcards.length;
            updateCard();
            attachListeners();
        }

        function updateCard() {
            if (flashcards.length === 0) return;
            const card = flashcards[state.cardIndex];
            document.getElementById('cardCategory').textContent = card.category;
            document.getElementById('cardQuestion').textContent = card.q;
            document.getElementById('cardAnswer').textContent = card.a;
            document.getElementById('cardAnswer').classList.add('hidden');
            document.getElementById('flipHint').classList.remove('hidden');
        }

        function attachListeners() {
            document.getElementById('card').addEventListener('click', flipCard);
            document.getElementById('flashcardMode').addEventListener('click', switchToFlashcard);
            document.getElementById('quizMode').addEventListener('click', switchToQuiz);
            document.getElementById('resetBtn').addEventListener('click', reset);
        }

        function flipCard() {
            const answer = document.getElementById('cardAnswer');
            const hint = document.getElementById('flipHint');
            if (answer.classList.contains('hidden')) {
                answer.classList.remove('hidden');
                hint.classList.add('hidden');
            } else {
                state.cardIndex = (state.cardIndex + 1) % flashcards.length;
                updateCard();
            }
        }

        function switchToFlashcard() {
            state.mode = 'flashcard';
            document.getElementById('flashcardSection').classList.remove('hidden');
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('flashcardMode').classList.add('active');
            document.getElementById('quizMode').classList.remove('active');
        }

        function switchToQuiz() {
            state.mode = 'quiz';
            document.getElementById('flashcardSection').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            document.getElementById('flashcardMode').classList.remove('active');
            document.getElementById('quizMode').classList.add('active');
        }

        function reset() {
            state.cardIndex = 0;
            state.correct = 0;
            state.incorrect = 0;
            state.streak = 0;
            updateStats();
            updateCard();
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = state.correct;
            document.getElementById('incorrectCount').textContent = state.incorrect;
            document.getElementById('streakCount').textContent = state.streak;
        }

        // Ensure init runs on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.addEventListener('load', () => {
            if (flashcards.length === 0) {
                init();
            }
        });
    </script>
</body>
</html>
